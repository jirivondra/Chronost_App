version: '3'

tasks:
  # --- API ---
  be-up:
    desc: Start the FastAPI backend and SOAP Calculator service
    cmds:
      - pkill -f "uvicorn api.main:app" || true
      - pkill -f "api.soap_calculator" || true
      - .venv/bin/python -m api.soap_calculator &
      - .venv/bin/uvicorn api.main:app --reload --host 0.0.0.0 --port 8000

  # --- Tests ---
  run-test:
    desc: Run all tests
    cmd: npm run test

  test-watch:
    desc: Run tests in watch mode
    cmd: npm run test-watch

  test-result:
    desc: Run tests with verbose output
    cmd: npm run test-verbose

  # --- Version ---
  version-gen:
    desc: Generate version.json from latest git tag (or commit hash)
    cmd: |
      VERSION=$(git describe --tags --always 2>/dev/null || git rev-parse --short HEAD)
      echo "{\"version\": \"$VERSION\"}" > frontend/assets/version.json
      echo "Version set to $VERSION"

  # --- Frontend ---
  fe-up:
    desc: Serve the frontend on http://localhost:3000 and open in Chrome
    cmds:
      - open -a "Google Chrome" http://localhost:3000/login.html &
      - python3 -m http.server 3000 --directory frontend

  fe-down:
    desc: Stop the frontend server
    cmd: pkill -f "http.server 3000" || true

  # --- Utilities ---
  clean:
    desc: Remove Python cache files
    cmd: find . -type d -name __pycache__ -exec rm -rf {} +

  be-down:
    desc: Stop the FastAPI backend and SOAP Calculator service
    cmds:
      - pkill -f "uvicorn api.main:app" || true
      - pkill -f "api.soap_calculator" || true

  soap-up:
    desc: Start the SOAP Calculator service on http://localhost:8001
    cmd: .venv/bin/python -m api.soap_calculator

  soap-down:
    desc: Stop the SOAP Calculator service
    cmd: pkill -f "api.soap_calculator" || true

  restart:
    desc: Clean cache and restart the API
    cmds:
      - task: clean
      - task: be-up

  # --- Code quality ---
  lint:
    desc: Check code with ESLint
    cmd: npm run lint

  lint-fix:
    desc: Auto-fix lint issues with ESLint
    cmd: npm run lint-fix

  format-check:
    desc: Check code formatting with Prettier
    cmd: npm run format-check

  check:
    desc: Run all code quality checks (ESLint + Prettier)
    cmds:
      - task: lint
      - task: format-check

  fix:
    desc: Auto-fix formatting and lint issues (Prettier + ESLint)
    cmds:
      - npm run format
      - npm run lint-fix

name: API Coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  coverage:
    name: API Coverage
    runs-on: ubuntu-latest
    env:
      API_USERNAME: ${{ secrets.API_USERNAME }}
      API_PASSWORD: ${{ secrets.API_PASSWORD }}

    steps:
      - name: Checkout API
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install API dependencies
        run: pip install -r api/requirements.txt coverage

      - name: Checkout Mocha tests
        uses: actions/checkout@v4
        with:
          repository: jirivondra/mocha_api_soap_testing
          path: mocha-tests

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test dependencies
        run: npm ci
        working-directory: mocha-tests

      - name: Create API .env
        run: |
          echo "API_USERNAME=${{ secrets.API_USERNAME }}" > .env
          echo "API_PASSWORD=${{ secrets.API_PASSWORD }}" >> .env

      - name: Create test .env
        run: |
          echo "BASE_URL=http://localhost:8000" > mocha-tests/.env
          echo "SOAP_URL=http://localhost:8001" >> mocha-tests/.env
          echo "API_USERNAME=${{ secrets.API_USERNAME }}" >> mocha-tests/.env
          echo "API_PASSWORD=${{ secrets.API_PASSWORD }}" >> mocha-tests/.env

      - name: Start REST API with coverage
        run: |
          coverage run --parallel-mode --include=api/main.py \
            -m uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/rest_pid

      - name: Start SOAP API with coverage
        run: |
          coverage run --parallel-mode --include=api/soap_calculator.py \
            api/soap_calculator.py &
          echo $! > /tmp/soap_pid

      - name: Wait for REST API
        run: |
          timeout 30 bash -c \
            'until curl -sf -u "$API_USERNAME:$API_PASSWORD" http://localhost:8000/todos > /dev/null; do sleep 1; done'

      - name: Wait for SOAP API
        run: |
          timeout 30 bash -c \
            'until curl -sf http://localhost:8001/?wsdl > /dev/null; do sleep 1; done'

      - name: Run Mocha tests
        run: npm test
        working-directory: mocha-tests

      - name: Stop servers
        if: always()
        run: |
          kill -INT "$(cat /tmp/rest_pid)" 2>/dev/null || true
          kill -INT "$(cat /tmp/soap_pid)" 2>/dev/null || true
          sleep 3

      - name: Generate coverage report
        run: |
          coverage combine
          coverage xml -o coverage.xml
          coverage report

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml

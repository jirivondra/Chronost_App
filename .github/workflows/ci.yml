name: CI

on:
  pull_request:

jobs:
  code-quality:
    name: correct code (prettier + lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: ESLint
        run: task lint

      - name: Prettier
        run: task format-check

  run-tests:
    name: API test
    runs-on: ubuntu-latest
    env:
      API_USERNAME: ${{ secrets.API_USERNAME }}
      API_PASSWORD: ${{ secrets.API_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          rm -f package-lock.json && npm install
          pip install -r api/requirements.txt

      - name: Create .env file
        run: |
          echo "API_USERNAME=${{ secrets.API_USERNAME }}" > .env
          echo "API_PASSWORD=${{ secrets.API_PASSWORD }}" >> .env

      - name: Start API
        run: uvicorn api.main:app --host 0.0.0.0 --port 8000 &

      - name: Wait for API
        run: |
          timeout 30 bash -c \
            'until curl -sf -u "$API_USERNAME:$API_PASSWORD" http://localhost:8000/todos > /dev/null; do sleep 1; done'

      - name: Run tests
        run: task run-test

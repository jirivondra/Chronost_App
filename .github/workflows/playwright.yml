name: Playwright Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: Playwright Smoke Tests
    runs-on: ubuntu-latest
    env:
      API_USERNAME: ${{ secrets.API_USERNAME }}
      API_PASSWORD: ${{ secrets.API_PASSWORD }}

    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Checkout Playwright tests
        uses: actions/checkout@v4
        with:
          repository: jirivondra/Chronos_Playwright_testing
          path: playwright-tests

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install API dependencies
        run: pip install -r api/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright test dependencies
        run: npm ci
        working-directory: playwright-tests

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: playwright-tests

      - name: Create API .env
        run: |
          echo "API_USERNAME=${{ secrets.API_USERNAME }}" > .env
          echo "API_PASSWORD=${{ secrets.API_PASSWORD }}" >> .env

      - name: Create Playwright .env
        run: |
          echo "BASE_URL=http://localhost:3000" > playwright-tests/.env
          echo "API_BASE_URL=http://localhost:8000" >> playwright-tests/.env
          echo "API_USERNAME=${{ secrets.API_USERNAME }}" >> playwright-tests/.env
          echo "API_PASSWORD=${{ secrets.API_PASSWORD }}" >> playwright-tests/.env

      - name: Start API
        run: uvicorn api.main:app --host 0.0.0.0 --port 8000 &

      - name: Start frontend
        run: python3 -m http.server 3000 --directory frontend &

      - name: Wait for API
        run: |
          timeout 30 bash -c \
            'until curl -sf -u "$API_USERNAME:$API_PASSWORD" http://localhost:8000/todos > /dev/null; do sleep 1; done'

      - name: Wait for frontend
        run: |
          timeout 30 bash -c \
            'until curl -sf http://localhost:3000/login.html > /dev/null; do sleep 1; done'

      - name: Run Playwright smoke tests
        run: npx playwright test tests/smoke --project=chromium
        working-directory: playwright-tests

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-tests/playwright-report/
          retention-days: 30

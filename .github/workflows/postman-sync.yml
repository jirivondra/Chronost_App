name: Sync Postman Collection

on:
  push:
    branches: [main]
    paths:
      - 'api/main.py'
      - 'postman-sync/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Chronost_App
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install API dependencies
        run: pip install -r api/requirements.txt

      - name: Export OpenAPI schema
        run: python api/export_openapi.py > openapi.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Checkout Postman collection repo
        uses: actions/checkout@v4
        with:
          repository: jirivondra/chronos_postman_colection
          path: postman-repo
          token: ${{ secrets.POSTMAN_REPO_TOKEN }}

      - name: Generate request skeletons from spec
        run: node postman-sync/generate.js --spec openapi.json --out postman-sync-tmp/generated

      - name: Compose collection
        run: |
          node postman-sync/compose.js \
            --generated postman-sync-tmp/generated \
            --scripts postman-repo/scripts \
            --manifest postman-repo/sync-manifest.json \
            --current postman-repo/collections/todo-app.postman_collection.json \
            --out postman-repo/collections/todo-app.postman_collection.json

      - name: Check for missing scripts
        run: |
          node postman-sync/check-missing-scripts.js \
            --generated postman-sync-tmp/generated \
            --scripts postman-repo/scripts \
            --manifest postman-repo/sync-manifest.json \
            --out missing-scripts.md

      - name: Open PR in Postman collection repo
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.POSTMAN_REPO_TOKEN }}
          path: postman-repo
          branch: sync/openapi-update
          commit-message: 'sync: update collection from OpenAPI spec'
          title: 'Sync Postman collection with API changes'
          body-path: missing-scripts.md
          add-paths: collections/todo-app.postman_collection.json
